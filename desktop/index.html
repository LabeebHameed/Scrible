<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scrible</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #0e0f13; color: #f2f3f7; }
      .pane { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
      header { display: flex; justify-content: space-between; align-items: center; }
      h1 { font-size: 20px; font-weight: 800; margin: 0 0 4px; }
      .dim { color: #9aa0b0; font-size: 13px; margin: 0; }
      input { background: #1a1c23; border: 1px solid #2e3240; color: #f2f3f7; border-radius: 10px; padding: 10px 12px; font-size: 14px; width: 100%; }
      button { border: 1px solid #2e3240; background: #242732; color: #f2f3f7; border-radius: 10px; padding: 9px 14px; font-size: 13px; cursor: pointer; }
      button.primary { background: #e8b84b; border-color: #e8b84b; color: #141519; font-weight: 700; }
      button.link { background: none; border: none; color: #9aa0b0; font-size: 12px; }
      .error { color: #e06c6c; font-size: 13px; }
      .banner { background: #1a1c23; border: 1px solid #2e3240; border-radius: 12px; padding: 12px; }
      .banner p { margin: 0 0 10px; font-size: 13px; line-height: 1.5; }
      .item { display: flex; justify-content: space-between; align-items: center; gap: 10px; background: #1a1c23; border: 1px solid #2e3240; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
      .item.hot { border-color: #e8b84b; }
      .title { font-size: 14px; font-weight: 600; }
      .trigger { color: #9aa0b0; font-size: 12px; margin-top: 4px; }
      code { color: #e8b84b; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
